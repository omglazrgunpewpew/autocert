site_name: AutoCert Documentation
repo_url: https://github.com/omglazrgunpewpew/autocert
repo_name: omglazrgunpewpew/autocert
theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - search.suggest
    - search.highlight
    - content.tabs.link
nav:
  - Home: index.md
  - Installation: INSTALLATION.md
  - Usage: USAGE.md
  - DNS Providers: DNS-PROVIDERS.md
  - Reliability: RELIABILITY.md
  - Troubleshooting: TROUBLESHOOTING.md
  - Contributing: CONTRIBUTING.md
  - Changelog: CHANGELOG.md
  - License: LICENSE.md
