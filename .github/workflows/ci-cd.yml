name: AutoCert CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  security-events: write
  actions: read

jobs:
  code-quality:
    name: Code Quality & Security Checks
    runs-on: windows-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Cache PowerShell Modules
      uses: actions/cache@v4
      with:
        path: |
          ~\Documents\PowerShell\Modules
          ~\Documents\WindowsPowerShell\Modules
        key: ${{ runner.os }}-powershell-modules-${{ hashFiles('**/*.psd1') }}-poshacme-4.29.1
        restore-keys: |
          ${{ runner.os }}-powershell-modules-${{ hashFiles('**/*.psd1') }}-
          ${{ runner.os }}-powershell-modules-
          
    - name: Install Required Modules
      shell: pwsh
      run: |
        # Install modules with specific versions to ensure consistency
        Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
        Install-Module Pester -Force -Scope CurrentUser -MinimumVersion 5.0
        
        # Install specific version of Posh-ACME to prevent auto-updates during tests
        if (-not (Get-Module Posh-ACME -ListAvailable | Where-Object Version -eq '4.29.1')) {
          Install-Module Posh-ACME -RequiredVersion 4.29.1 -Force -Scope CurrentUser
        }
        
        # Disable Posh-ACME auto-update check during CI
        $env:POSHACME_SKIP_UPGRADE_CHECK = $true
        
    - name: Run PSScriptAnalyzer
      shell: pwsh
      env:
        POSHACME_SKIP_UPGRADE_CHECK: true
      run: |
        $allIssues = @()
        $pathsToCheck = @('./Core', './Functions', './Main.ps1', './Build-Validation.ps1')
        
        foreach ($path in $pathsToCheck) {
          if (Test-Path $path) {
            $issues = Invoke-ScriptAnalyzer -Path $path -Settings ./PSScriptAnalyzerSettings.psd1
            $allIssues += $issues
          }
        }
        
        if ($allIssues) {
          Write-Host "PSScriptAnalyzer found $($allIssues.Count) issues:" -ForegroundColor Yellow
          $allIssues | Format-Table RuleName, Severity, ScriptName, Line, Message -AutoSize
          
          $errors = $allIssues | Where-Object Severity -eq 'Error'
          if ($errors) {
            Write-Host "❌ Found $($errors.Count) critical errors" -ForegroundColor Red
            exit 1
          } else {
            Write-Host "⚠️ Found warnings but no critical errors" -ForegroundColor Yellow
          }
        } else {
          Write-Host "✅ No PSScriptAnalyzer issues found!" -ForegroundColor Green
        }
        
    - name: Run Build Validation
      shell: pwsh
      env:
        POSHACME_SKIP_UPGRADE_CHECK: true
      run: |
        .\Build-Validation.ps1 -Detailed
        
    - name: Security Scan with PSScriptAnalyzer
      shell: pwsh
      run: |
        $allSecurityIssues = @()
        $pathsToCheck = @('./Core', './Functions', './Main.ps1', './Build-Validation.ps1')
        
        foreach ($path in $pathsToCheck) {
          if (Test-Path $path) {
            $securityIssues = Invoke-ScriptAnalyzer -Path $path -IncludeRule PSAvoidUsingPlainTextForPassword,PSAvoidUsingConvertToSecureStringWithPlainText,PSUseShouldProcessForStateChangingFunctions
            $allSecurityIssues += $securityIssues
          }
        }
        
        if ($allSecurityIssues) {
          Write-Host "🔒 Security issues found:" -ForegroundColor Red
          $allSecurityIssues | Format-Table RuleName, ScriptName, Line, Message -AutoSize
          exit 1
        } else {
          Write-Host "✅ No security issues found!" -ForegroundColor Green
        }

  test:
    name: Unit & Integration Tests
    runs-on: windows-latest
    needs: code-quality
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
        
    - name: Install Test Dependencies
      shell: pwsh
      run: |
        Install-Module Pester -Force -Scope CurrentUser -MinimumVersion 5.0
        
        # Install specific version of Posh-ACME to prevent auto-updates during tests
        if (-not (Get-Module Posh-ACME -ListAvailable | Where-Object Version -eq '4.29.1')) {
          Install-Module Posh-ACME -RequiredVersion 4.29.1 -Force -Scope CurrentUser
        }
        
        # Disable Posh-ACME auto-update check during CI
        $env:POSHACME_SKIP_UPGRADE_CHECK = $true
        
    - name: Run Unit Tests
      shell: pwsh
      env:
        POSHACME_SKIP_UPGRADE_CHECK: true
      run: |
        $config = New-PesterConfiguration
        $config.Run.Path = './Tests'
        $config.Output.Verbosity = 'Detailed'
        $config.CodeCoverage.Enabled = $true
        $config.CodeCoverage.Path = @('./Core/*.ps1', './Functions/*.ps1')
        $config.CodeCoverage.OutputFormat = 'JaCoCo'
        $config.CodeCoverage.OutputPath = './coverage.xml'
        
        $results = Invoke-Pester -Configuration $config
        
        if ($results.FailedCount -gt 0) {
          Write-Host "❌ $($results.FailedCount) tests failed" -ForegroundColor Red
          exit 1
        } else {
          Write-Host "✅ All $($results.TotalCount) tests passed!" -ForegroundColor Green
        }
        
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-pwsh
        path: |
          coverage.xml
          TestResults.xml
          
    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v4
      continue-on-error: true
      with:
        file: ./coverage.xml
        flags: powershell-pwsh
        name: codecov-umbrella
        token: ${{ secrets.CODECOV_TOKEN }}

  security-scan:
    name: Security Vulnerability Scan
    runs-on: windows-latest
    needs: code-quality
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Run DevSkim Security Scanner
      uses: microsoft/devskim-action@v1
      with:
        directory-to-scan: .
        
    - name: Upload DevSkim Results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: devskim-results.sarif

  documentation:
    name: Documentation & Help Generation
    runs-on: windows-latest
    needs: test
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Generate Module Documentation
      shell: pwsh
      run: |
        Install-Module PlatyPS -Force -Scope CurrentUser
        
        # Import module
        Import-Module ./Main.ps1 -Force
        
        # Generate markdown help files
        $outputPath = './docs/help'
        if (-not (Test-Path $outputPath)) {
          New-Item -ItemType Directory -Path $outputPath -Force
        }
        
        New-MarkdownHelp -Module AutoCert -OutputFolder $outputPath -Force
        
    - name: Upload Documentation Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: documentation
        path: ./docs/

  release:
    name: Create Release
    runs-on: windows-latest
    needs: [test, security-scan, documentation]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for changelog generation
        
    - name: Generate Version Number
      id: version
      shell: pwsh
      run: |
        # Simple semantic versioning based on commit messages
        $version = "2.0.0"
        $buildNumber = $env:GITHUB_RUN_NUMBER
        $fullVersion = "$version.$buildNumber"
        
        Write-Host "Generated version: $fullVersion"
        echo "version=$fullVersion" >> $env:GITHUB_OUTPUT
        
    - name: Create Release Package
      shell: pwsh
      run: |
        $packagePath = "./AutoCert-${{ steps.version.outputs.version }}"
        
        # Create package directory structure
        New-Item -ItemType Directory -Path $packagePath -Force
        
        # Copy core files
        Copy-Item -Path @('./Core', './Functions', './Main.ps1', './README.md', './LICENSE') -Destination $packagePath -Recurse -Force
        
        # Create ZIP package
        Compress-Archive -Path $packagePath -DestinationPath "./AutoCert-${{ steps.version.outputs.version }}.zip" -Force
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: AutoCert v${{ steps.version.outputs.version }}
        body: |
          ## AutoCert Release v${{ steps.version.outputs.version }}
          
          ### 🚀 What's New
          - Automated certificate management with Let's Encrypt
          - Multi-channel notification system (Email, Teams, Slack)
          - Enhanced security and error handling
          - Improved PowerShell best practices compliance
          
          ### 📋 Quality Metrics
          - ✅ All PSScriptAnalyzer checks passed
          - ✅ All unit tests passed
          - ✅ Security scans completed
          - ✅ Documentation generated
          
          ### 💾 Installation
          1. Download and extract the ZIP file
          2. Import the module: `Import-Module ./Main.ps1`
          3. Follow the setup guide in README.md
          
          For full documentation, see: [AutoCert Documentation](./docs/)
        files: |
          AutoCert-${{ steps.version.outputs.version }}.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
