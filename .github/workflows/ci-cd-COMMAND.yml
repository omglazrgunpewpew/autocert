name: AutoCert CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: write
  security-events: write
  actions: read

jobs:
  code-quality:
    name: Code Quality & Security Checks
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Cache PowerShell Modules
        uses: actions/cache@v4
        with:
          path: |
            ~\Documents\PowerShell\Modules
            ~\Documents\WindowsPowerShell\Modules
          key: ${{ runner.os }}-powershell-modules-${{ hashFiles('**/*.psd1') }}-poshacme-4.29.2
          restore-keys: |
            ${{ runner.os }}-powershell-modules-${{ hashFiles('**/*.psd1') }}-
            ${{ runner.os }}-powershell-modules-

      - name: Install Required Modules
        shell: pwsh
        run: |
          # Install modules with specific versions to ensure consistency
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          Install-Module Pester -Force -Scope CurrentUser -MinimumVersion 5.0

          # Install specific version of Posh-ACME to prevent auto-updates during tests
          if (-not (Get-Module Posh-ACME -ListAvailable | Where-Object Version -eq '4.29.2')) {
            Install-Module Posh-ACME -RequiredVersion 4.29.2 -Force -Scope CurrentUser
          }

          # Disable Posh-ACME auto-update check during CI
          $env:POSHACME_SKIP_UPGRADE_CHECK = $true

      - name: Run PSScriptAnalyzer
        shell: pwsh
        env:
          POSHACME_SKIP_UPGRADE_CHECK: true
        run: |
          $allIssues = @()
          $pathsToCheck = @()

          # Add paths that exist
          @('./Core', './Functions', './UI', './Utilities', './Main.ps1', './build/Build-Validation.ps1') | ForEach-Object {
            if (Test-Path $_) {
              $pathsToCheck += $_
            } else {
              Write-Host "⚠️ Skipping non-existent path: $_" -ForegroundColor Yellow
            }
          }

          foreach ($path in $pathsToCheck) {
            try {
              Write-Host "🔍 Analyzing: $path" -ForegroundColor Cyan
              $issues = Invoke-ScriptAnalyzer -Path $path -Settings ./tools/PSScriptAnalyzerSettings.psd1 -ErrorAction SilentlyContinue
              if ($issues) {
                $allIssues += $issues
              }
            }
            catch {
              Write-Host "⚠️ Failed to analyze $path : $($_.Exception.Message)" -ForegroundColor Yellow
            }
          }

          if ($allIssues) {
            Write-Host "PSScriptAnalyzer found $($allIssues.Count) issues:" -ForegroundColor Yellow
            $allIssues | Format-Table RuleName, Severity, ScriptName, Line, Message -AutoSize
            
            $errors = $allIssues | Where-Object Severity -eq 'Error'
            $criticalWarnings = $allIssues | Where-Object { $_.Severity -eq 'Warning' -and $_.RuleName -in @('PSAvoidUsingPlainTextForPassword', 'PSAvoidUsingConvertToSecureStringWithPlainText') }
            
            if ($errors -or $criticalWarnings) {
              $criticalCount = ($errors + $criticalWarnings).Count
              Write-Host "❌ Found $criticalCount critical issues" -ForegroundColor Red
              exit 1
            } else {
              Write-Host "⚠️ Found warnings but no critical errors" -ForegroundColor Yellow
            }
          } else {
            Write-Host "✅ No PSScriptAnalyzer issues found!" -ForegroundColor Green
          }

      - name: Run Build Validation
        shell: pwsh
        env:
          POSHACME_SKIP_UPGRADE_CHECK: true
        run: |
          if (Test-Path './build/Build-Validation.ps1') {
            Write-Host "🔧 Running build validation..." -ForegroundColor Cyan
            try {
              # Run Build-Validation from the project root, not the build directory
              & './build/Build-Validation.ps1' -Detailed
              Write-Host "✅ Build validation completed successfully!" -ForegroundColor Green
            }
            catch {
              Write-Host "❌ Build validation failed: $($_.Exception.Message)" -ForegroundColor Red
              exit 1
            }
          } else {
            Write-Host "⚠️ Build validation script not found, skipping..." -ForegroundColor Yellow
          }

      - name: Security Scan with PSScriptAnalyzer
        shell: pwsh
        run: |
          $allSecurityIssues = @()
          $pathsToCheck = @()

          # Add paths that exist
          @('./Core', './Functions', './UI', './Utilities', './Main.ps1', './build/Build-Validation.ps1') | ForEach-Object {
            if (Test-Path $_) {
              $pathsToCheck += $_
            }
          }

          foreach ($path in $pathsToCheck) {
            try {
              Write-Host "🔒 Security scanning: $path" -ForegroundColor Cyan
              $securityIssues = Invoke-ScriptAnalyzer -Path $path -IncludeRule PSAvoidUsingPlainTextForPassword,PSAvoidUsingConvertToSecureStringWithPlainText,PSUseShouldProcessForStateChangingFunctions -ErrorAction SilentlyContinue
              if ($securityIssues) {
                $allSecurityIssues += $securityIssues
              }
            }
            catch {
              Write-Host "⚠️ Failed to security scan $path : $($_.Exception.Message)" -ForegroundColor Yellow
            }
          }

          if ($allSecurityIssues) {
            $criticalSecurity = $allSecurityIssues | Where-Object { $_.RuleName -in @('PSAvoidUsingPlainTextForPassword', 'PSAvoidUsingConvertToSecureStringWithPlainText') }
            if ($criticalSecurity) {
              Write-Host "🔒 Critical security issues found:" -ForegroundColor Red
              $criticalSecurity | Format-Table RuleName, ScriptName, Line, Message -AutoSize
              exit 1
            } else {
              Write-Host "🔒 Security recommendations found:" -ForegroundColor Yellow
              $allSecurityIssues | Format-Table RuleName, ScriptName, Line, Message -AutoSize
            }
          } else {
            Write-Host "✅ No security issues found!" -ForegroundColor Green
          }

  test:
    name: Unit & Integration Tests
    runs-on: windows-latest
    needs: code-quality

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Test Dependencies
        shell: pwsh
        run: |
          Install-Module Pester -Force -Scope CurrentUser -MinimumVersion 5.0

          # Install specific version of Posh-ACME to prevent auto-updates during tests
          if (-not (Get-Module Posh-ACME -ListAvailable | Where-Object Version -eq '4.29.2')) {
            Install-Module Posh-ACME -RequiredVersion 4.29.2 -Force -Scope CurrentUser
          }

          # Disable Posh-ACME auto-update check during CI
          $env:POSHACME_SKIP_UPGRADE_CHECK = $true

      - name: Run Unit Tests
        shell: pwsh
        env:
          POSHACME_SKIP_UPGRADE_CHECK: true
        run: |
          if (-not (Test-Path './Tests')) {
            Write-Host "⚠️ Tests directory not found, skipping tests..." -ForegroundColor Yellow
            exit 0
          }

          Write-Host "🧪 Running Pester tests..." -ForegroundColor Cyan

          $config = New-PesterConfiguration
          $config.Run.Path = './Tests'
          $config.Output.Verbosity = 'Detailed'
          $config.CodeCoverage.Enabled = $true
          $config.CodeCoverage.Path = @()

          # Add coverage paths that exist
          @('./Core/*.ps1', './Public/*.ps1', './Private/*.ps1') | ForEach-Object {
            if (Test-Path $_) {
              $config.CodeCoverage.Path += $_
            }
          }

          $config.CodeCoverage.OutputFormat = 'JaCoCo'
          $config.CodeCoverage.OutputPath = './coverage.xml'

          try {
            $results = Invoke-Pester -Configuration $config
            
            if ($results.FailedCount -gt 0) {
              Write-Host "❌ $($results.FailedCount) tests failed" -ForegroundColor Red
              exit 1
            } else {
              Write-Host "✅ All $($results.TotalCount) tests passed!" -ForegroundColor Green
            }
          }
          catch {
            Write-Host "❌ Test execution failed: $($_.Exception.Message)" -ForegroundColor Red
            exit 1
          }

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-pwsh
          path: |
            coverage.xml
            TestResults.xml

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          file: ./coverage.xml
          flags: powershell-pwsh
          name: codecov-umbrella
          token: ${{ secrets.CODECOV_TOKEN }}

  security-scan:
    name: Security Vulnerability Scan
    runs-on: windows-latest
    needs: code-quality

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run DevSkim Security Scanner
        uses: microsoft/devskim-action@v1
        with:
          directory-to-scan: .

      - name: Upload DevSkim Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: devskim-results.sarif

  documentation:
    name: Documentation & Help Generation
    runs-on: windows-latest
    needs: test

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Module Documentation
        shell: pwsh
        run: |
          try {
            Install-Module PlatyPS -Force -Scope CurrentUser
            
            # Check if Main.ps1 exists and try to import it
            if (Test-Path './Main.ps1') {
              Write-Host "📚 Generating documentation..." -ForegroundColor Cyan
              
              # Try to import module safely
              try {
                Import-Module ./Main.ps1 -Force -ErrorAction SilentlyContinue
              }
              catch {
                Write-Host "⚠️ Could not import module for documentation: $($_.Exception.Message)" -ForegroundColor Yellow
              }
              
              # Generate markdown help files
              $outputPath = './docs/help'
              if (-not (Test-Path $outputPath)) {
                New-Item -ItemType Directory -Path $outputPath -Force
              }
              
              # Try to generate help, but don't fail if it doesn't work
              try {
                if (Get-Module AutoCert -ErrorAction SilentlyContinue) {
                  New-MarkdownHelp -Module AutoCert -OutputFolder $outputPath -Force
                  Write-Host "✅ Documentation generated successfully!" -ForegroundColor Green
                } else {
                  Write-Host "⚠️ Module not loaded, creating basic documentation structure..." -ForegroundColor Yellow
                  # Create a basic README for the help folder
                  "# AutoCert Help Documentation`n`nDocumentation will be generated automatically when the module is properly loaded." | Out-File -FilePath "$outputPath/README.md" -Encoding UTF8
                }
              }
              catch {
                Write-Host "⚠️ Documentation generation failed: $($_.Exception.Message)" -ForegroundColor Yellow
                # Create basic documentation structure
                "# AutoCert Help Documentation`n`nDocumentation generation encountered an issue. Please refer to the main README.md for usage information." | Out-File -FilePath "$outputPath/README.md" -Encoding UTF8
              }
            } else {
              Write-Host "⚠️ Main.ps1 not found, skipping documentation generation..." -ForegroundColor Yellow
            }
          }
          catch {
            Write-Host "⚠️ Documentation step failed: $($_.Exception.Message)" -ForegroundColor Yellow
            # Don't fail the build for documentation issues
          }

      - name: Upload Documentation Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: ./docs/

  release:
    name: Create Release
    runs-on: windows-latest
    needs: [test, security-scan, documentation]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for changelog generation

      - name: Generate Version Number
        id: version
        shell: pwsh
        run: |
          # Simple semantic versioning based on commit messages
          $version = "2.0.0"
          $buildNumber = $env:GITHUB_RUN_NUMBER
          $fullVersion = "$version.$buildNumber"

          Write-Host "Generated version: $fullVersion"
          echo "version=$fullVersion" >> $env:GITHUB_OUTPUT

      - name: Create Release Package
        shell: pwsh
        run: |
          $packagePath = "./AutoCert-${{ steps.version.outputs.version }}"

          Write-Host "📦 Creating release package..." -ForegroundColor Cyan

          # Create package directory structure
          New-Item -ItemType Directory -Path $packagePath -Force

          # Copy core files that exist
          $filesToCopy = @('./Core', './Functions', './UI', './Utilities', './Main.ps1', './README.md')

          # Add LICENSE file if it exists (might be LICENSE.md or LICENSE)
          if (Test-Path './LICENSE') {
            $filesToCopy += './LICENSE'
          } elseif (Test-Path './docs/LICENSE.md') {
            $filesToCopy += './docs/LICENSE.md'
          }

          foreach ($item in $filesToCopy) {
            if (Test-Path $item) {
              Write-Host "📄 Adding: $item" -ForegroundColor Gray
              Copy-Item -Path $item -Destination $packagePath -Recurse -Force
            } else {
              Write-Host "⚠️ Skipping missing: $item" -ForegroundColor Yellow
            }
          }

          # Create ZIP package
          Compress-Archive -Path $packagePath -DestinationPath "./AutoCert-${{ steps.version.outputs.version }}.zip" -Force

          Write-Host "✅ Package created: AutoCert-${{ steps.version.outputs.version }}.zip" -ForegroundColor Green

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: AutoCert v${{ steps.version.outputs.version }}
          body: |
            ## AutoCert Release v${{ steps.version.outputs.version }}

            ### 🚀 What's New
            - Automated certificate management with Let's Encrypt
            - Multi-channel notification system (Email, Teams, Slack)
            - Enhanced security and error handling
            - Improved PowerShell best practices compliance

            ### 📋 Quality Metrics
            - ✅ All PSScriptAnalyzer checks passed
            - ✅ All unit tests passed
            - ✅ Security scans completed
            - ✅ Documentation generated

            ### 💾 Installation
            1. Download and extract the ZIP file
            2. Import the module: `Import-Module ./Main.ps1`
            3. Follow the setup guide in README.md

            For full documentation, see: [AutoCert Documentation](./docs/)
          files: |
            AutoCert-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
