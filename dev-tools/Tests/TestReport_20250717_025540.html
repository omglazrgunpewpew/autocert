<!DOCTYPE html>
<html>
<head>
    <title>AutoCert Test Report</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .header { background-color: #f0f0f0; padding: 10px; border-radius: 5px; }
        .suite { margin: 20px 0; }
        .passed { color: green; }
        .failed { color: red; }
        .skipped { color: orange; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <div class="header">
        <h1>AutoCert Test Report</h1>
        <p>Generated: 07/17/2025 02:55:40</p>
        <p>Total Duration: 0.15 minutes</p>
    </div>    <div class="suite">
        <h2>Integration Test Suite</h2>
        <table>
            <tr><th>Metric</th><th>Value</th></tr>
            <tr><td>Total Tests</td><td>8</td></tr>
            <tr><td class="passed">Passed</td><td>1</td></tr>
            <tr><td class="failed">Failed</td><td>7</td></tr>
            <tr><td class="skipped">Skipped</td><td>0</td></tr>
            <tr><td>Success Rate</td><td>12.5%</td></tr>
            <tr><td>Duration</td><td>9048 ms</td></tr>
        </table>
    </div></body>
</html>
